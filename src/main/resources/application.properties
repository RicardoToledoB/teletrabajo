spring.application.name=teletrabajo
spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}

# Configuracion comun
spring.jackson.time-zone=America/Punta_Arenas
# Evita desfases al persistir/leer LocalDateTime con JDBC
spring.jpa.properties.hibernate.jdbc.time_zone=America/Punta_Arenas

# Swagger / OpenAPI
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/api-docs

# Errores: para desarrollo se muestran mensajes. En produccion puede sobreescribirse por variable de entorno.
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:always}
server.error.include-stacktrace=${SERVER_ERROR_INCLUDE_STACKTRACE:never}

# JWT
# En produccion se recomienda definir JWT_SECRET como variable de entorno.
app.jwt.secret=${JWT_SECRET:change_me_with_a_very_long_random_256bit_secret___________________________}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Mail / SMTP
# Definir estas variables solo cuando se use recuperacion/envio de correos.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
