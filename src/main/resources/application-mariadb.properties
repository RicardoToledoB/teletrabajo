# Perfil MariaDB / alternativa si el motor productivo es MariaDB
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:teletrabajo_db}?useSSL=${DB_USE_SSL:false}&serverTimezone=America/Santiago&useUnicode=true&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:teletrabajo_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}

# En MariaDB/servidor no se crean usuarios demo automáticamente.
app.data-seeder.enabled=${DATA_SEEDER_ENABLED:false}
