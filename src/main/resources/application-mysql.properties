# Perfil MySQL 8.x / ambiente real
# Uso local sugerido:
#   SPRING_PROFILES_ACTIVE=mysql
#   DB_HOST=localhost
#   DB_PORT=3306
#   DB_NAME=teletrabajo_db
#   DB_USERNAME=teletrabajo_user
#   DB_PASSWORD=ClaveSegura

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:teletrabajo_db}?useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago&useUnicode=true&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:teletrabajo_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Para primera migracion/desarrollo: update.
# Para produccion formal: validar scripts SQL/Flyway y considerar validate.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# En MySQL no se ejecuta data.sql automaticamente para evitar duplicados sobre bases persistentes.
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=false

spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}

# En MySQL/servidor no se crean usuarios demo automáticamente.
# Cambiar a true solo para carga inicial controlada.
app.data-seeder.enabled=${DATA_SEEDER_ENABLED:false}
